<!DOCTYPE html>
<html>
<head>
  <title>Simple Webpage</title>

  <style>
    /* Simple styling only */
    body {
      font-family: Arial;
    }

    nav {
      background: black;
      padding: 10px;
    }

    nav a {
      color: white;
      margin-right: 10px;
      text-decoration: none;
    }

    table {
      border-collapse: collapse;
      width: 50%;
    }

    th, td {
      border: 1px solid black;
      padding: 5px;
    }

    th {
      background: lightgray;
    }
  </style>

</head>

<body>

  <!-- Navigation Menu -->
  <nav>
    <a href="#home">Home</a>
    <a href="#form">Form</a>
    <a href="#table">Table</a>
  </nav>

  <h2 id="home">Welcome</h2>

  <!-- Clickable Image -->
  <a href="https://www.google.com" target="_blank">
    <img src="https://uploads.onecompiler.io/44ejwpzbp/44km9ujqc/google.png" alt="Clickable Image">
  </a>

  <!-- Form with Validation -->
  <h3 id="form">Contact Form</h3>

  <form>
    <input type="text" name="name" placeholder="Name" required><br><br>

    <input type="email" name="email" placeholder="Email" required><br><br>

    <input type="number" name="age" placeholder="Age (must be 1-100)" min="1" max="100" required><br><br>

    <button type="submit">Submit</button>
  </form>

  <!-- Styled Table -->
  <h3 id="table">Skills Table</h3>

  <table>
    <tr>
      <th>Skill</th>
      <th>Level</th>
    </tr>
    <tr>
      <td>HTML</td>
      <td>Beginner</td>
    </tr>
    <tr>
      <td>Cooking</td>
      <td>Intermediate</td>
    </tr>
  </table>

</body>
</html>
